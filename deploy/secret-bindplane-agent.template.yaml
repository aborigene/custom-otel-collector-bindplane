apiVersion: v1
kind: Secret
metadata:
  name: bindplane-agent-auth
  namespace: fieldcrypto-lab
type: Opaque
stringData:
  # From BindPlane UI install flow (OpAMP endpoint, usually wss://.../v1/opamp)
  OPAMP_ENDPOINT: "wss://REPLACE_ME/v1/opamp"
  # From BindPlane UI install flow (agent secret key/token)
  OPAMP_SECRET_KEY: "REPLACE_ME"
