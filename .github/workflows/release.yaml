name: Build Collector Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 0.1.1). Required for manual runs from branches."
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            artifact_name: linux-amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update manifest version from git tag
        run: |
          set -euo pipefail
          
          # Get the version from either tag or workflow input
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="v${{ github.event.inputs.version }}"
          else
            echo "No version available"
            exit 1
          fi
          
          echo "Updating manifest version to: $version"
          
          # Update build/manifest.yaml version field
          sed -i "s/^  version: v[0-9]*\.[0-9]*\.[0-9]*$/  version: $version/" build/manifest.yaml
          
          # Verify the change
          echo "Manifest version updated:"
          grep "version:" build/manifest.yaml | head -1

      - name: Prepare local module replace paths
        run: |
          mkdir -p artifacts/.build
          rm -rf artifacts/.build/fieldcryptoprocessor
          cp -R fieldcryptoprocessor artifacts/.build/fieldcryptoprocessor

      - name: Build distribution artifacts (with heartbeat progress)
        shell: bash
        run: |
          set -euo pipefail

          heartbeat() {
            while true; do
              echo "[progress] Build still running... elapsed ${SECONDS}s"
              sleep 30
            done
          }

          heartbeat &
          HB_PID=$!
          trap 'kill "$HB_PID" 2>/dev/null || true' EXIT

          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            ghcr.io/observiq/otel-distro-builder:main \
            --manifest /github/workspace/build/manifest.yaml \
            --artifacts /github/workspace/artifacts \
            --goos "${{ matrix.os }}" \
            --goarch "${{ matrix.arch }}"

          kill "$HB_PID" 2>/dev/null || true
          wait "$HB_PID" 2>/dev/null || true
          echo "[progress] Build finished in ${SECONDS}s"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts-${{ matrix.artifact_name }}
          path: |
            artifacts/*.rpm
            artifacts/*.tar.gz
            artifacts/*.sbom.json
            artifacts/*_checksums.txt
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed to check branch ancestry

      - name: Verify tag is from main branch
        run: |
          set -euo pipefail
          
          # For tag triggers, verify the tag is reachable from main
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            
            # Verify the tag commit exists
            if ! git cat-file -t "$tag" >/dev/null 2>&1; then
              echo "❌ Release aborted: Tag '$tag' not found"
              exit 1
            fi
            
            # Verify tag is an ancestor of origin/main (tag is on main branch)
            if ! git merge-base --is-ancestor "$tag" origin/main; then
              echo "❌ Release aborted: Tag '$tag' is not on main branch"
              echo "   Only tags pushed from main branch can trigger releases"
              exit 1
            fi
            echo "✅ Verified: Tag '$tag' is on main branch"
          else
            echo "ℹ️ Manual workflow_dispatch run (not a tag trigger)"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: distribution-artifacts-*
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            tag="v${{ inputs.version }}"
          else
            echo "Manual runs require workflow_dispatch input: version (without leading v)."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"

          mapfile -t assets < <(find all-artifacts -type f | sort)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No artifacts found under all-artifacts/."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists, uploading assets with --clobber"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            echo "Creating release $tag"
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes "Automated release for $tag" \
              --target "$GITHUB_SHA"
          fi

      - name: Trigger BindPlane sync workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          
          # Use main as default ref since it's the repository default branch
          dispatch_ref="main"

          echo "Dispatching bindplane-sync workflow for tag: $tag on ref: $dispatch_ref"
          
          # Always sync 'latest' - BindPlane's GitHub version client only understands 'latest'
          # After release is published, 'latest' will automatically point to the new release
          if gh workflow run bindplane-sync.yaml \
            --ref "$dispatch_ref" \
            -f version="latest"; then
            echo "✅ Workflow dispatch successful. Sync will use latest available version."
          else
            echo "⚠️ Workflow dispatch failed. You may need to manually trigger sync from Actions tab."
            echo "   Tag: $tag"
          fi