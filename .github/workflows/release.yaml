name: Build Collector Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 0.1.1). Required for manual runs from branches."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            artifact_name: linux-amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Prepare local module replace paths
        run: |
          mkdir -p artifacts/.build
          rm -rf artifacts/.build/fieldcryptoprocessor
          cp -R fieldcryptoprocessor artifacts/.build/fieldcryptoprocessor

      - name: Build distribution artifacts
        uses: observiq/otel-distro-builder@main
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          manifest: build/manifest.yaml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts-${{ matrix.artifact_name }}
          path: |
            artifacts/*.rpm
            artifacts/*.tar.gz
            artifacts/*.sbom.json
            artifacts/*_checksums.txt
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: distribution-artifacts-*
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            tag="v${{ inputs.version }}"
          else
            echo "Manual runs require workflow_dispatch input: version (without leading v)."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"

          mapfile -t assets < <(find all-artifacts -type f | sort)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No artifacts found under all-artifacts/."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists, uploading assets with --clobber"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            echo "Creating release $tag"
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes "Automated release for $tag" \
              --target "$GITHUB_SHA"
          fi